[General]
network = RadioSch

# numărul de utilizatori
RadioSch.usersCount = 3

# parametrii pentru generatoarele tuturor userilor
**.generator.sendIaTime = 2ms   # intervalul mediu de generare pachete

# perioada scheduler-ului

*.scheduler.schedulingPeriod = 20ms
*.scheduler.B = 8
*.scheduler.weights = "1,1,1,1,1"

# for WRR
# *.scheduler.schedulingPeriod = 20ms
# *.scheduler.B = 8
# *.scheduler.weights = "1,1,1,1,1"

# DEBUG: afișează toate mesajele
sim-time-limit = 1s