[General]
network = RadioSch
record-eventlog = true
result-dir = results
output-vector-file = ${resultdir}/${configname}-${runnumber}.vec
output-scalar-file = ${resultdir}/${configname}-${runnumber}.sca
**.vector-recording = true
**.scalar-recording = true

# numărul de utilizatori
RadioSch.usersCount = 10

# priority groups
*.scheduler.NrOfHighPriorityUsers = 2
*.scheduler.NrOfMediumPriorityUsers = 5
*.scheduler.NrOfLowPriorityUsers = 3
*.scheduler.NrOfChannels = 30
*.scheduler.HighPriorityWeight = 4
*.scheduler.MediumPriorityWeight = 2
*.scheduler.LowPriorityWeight = 1

# FLC and priority targets
*.delayLimit = 1
*.flc.config = xmldoc("conf2.xml")

# parametrii pentru generatoarele tuturor userilor
**.generator.sendIaTime = 0.37ms   # intervalul mediu de generare pachete
**.generator.nrPackets = 1
**.generator.MAX_SIM = 500s

# scheduler settings
*.scheduler.schedulingPeriod = 1ms

# test / debug
sim-time-limit = 500s

